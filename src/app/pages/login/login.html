<app-header></app-header>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-card__logo">
      <img src="assets/Millenium_Logo_new.png" alt="Millennium Semiconductors" />
    </div>
    <h1 class="auth-card__title">Sign in to your account</h1>
    <p class="auth-card__subtitle">Access your orders, saved lists, and quotes at Millennium Semiconductors.</p>

    @if (error()) {
      <div class="auth-error" style="margin-bottom: 14px;">{{ error() }}</div>
    }

    <form class="auth-form" (ngSubmit)="submit()">
      <div class="auth-field">
        <label for="login-email">Email address</label>
        <input id="login-email" type="email" placeholder="you@company.com"
               [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" autocomplete="email" />
      </div>
      <div class="auth-field">
        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="••••••••"
               [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" autocomplete="current-password" />
      </div>

      <div class="auth-row-between">
        <label class="auth-checkbox">
          <input type="checkbox" [ngModel]="rememberMe()" (ngModelChange)="rememberMe.set($event)" name="remember" />
          Remember me
        </label>
        <a routerLink="/forgot-password">Forgot password?</a>
      </div>

      <button type="submit" class="auth-btn-primary" [disabled]="submitting()">
        {{ submitting() ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>

    <div class="auth-divider">OR</div>

    <app-google-signin-mock (selected)="onGoogleSignIn()"></app-google-signin-mock>

    <div class="auth-demo-note" style="margin-top: 18px;">
      Demo accounts (&#64;devon.nl): <strong>mobin</strong>/<strong>pass-mobin</strong>,
      <strong>shashank</strong>/<strong>pass-shashank</strong>,
      <strong>gautam</strong>/<strong>pass-gautam</strong>,
      <strong>gajanan</strong>/<strong>pass-gajanan</strong>
    </div>

    <p class="auth-footer-note">
      Don't have an account? <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>

<app-footer></app-footer>
