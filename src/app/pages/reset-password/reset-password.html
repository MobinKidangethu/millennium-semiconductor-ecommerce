<app-header></app-header>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-card__logo">
      <img src="assets/Millenium_Logo_new.png" alt="Millennium Digital" />
    </div>

    @if (success()) {
      <h1 class="auth-card__title">Password updated</h1>
      <div class="auth-success">
        Your password has been reset successfully. Redirecting you to sign in…
      </div>
    } @else {
      <h1 class="auth-card__title">Set a new password</h1>
      <p class="auth-card__subtitle">Choose a new password for your Millennium Semiconductors account.</p>

      @if (error()) {
        <div class="auth-error" style="margin-bottom: 14px;">{{ error() }}</div>
      }

      <form class="auth-form" (ngSubmit)="submit()">
        <div class="auth-field">
          <label for="rp-password">New password</label>
          <input id="rp-password" type="password" placeholder="At least 6 characters"
                 [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" autocomplete="new-password" />
        </div>
        <div class="auth-field">
          <label for="rp-confirm">Confirm new password</label>
          <input id="rp-confirm" type="password" placeholder="Re-enter your new password"
                 [ngModel]="confirmPassword()" (ngModelChange)="confirmPassword.set($event)" name="confirmPassword" autocomplete="new-password" />
        </div>

        <button type="submit" class="auth-btn-primary" [disabled]="submitting() || !token">
          {{ submitting() ? 'Updating…' : 'Update Password' }}
        </button>
      </form>
    }

    <p class="auth-footer-note">
      <a routerLink="/login">← Back to Sign In</a>
    </p>
  </div>
</div>

<app-footer></app-footer>
