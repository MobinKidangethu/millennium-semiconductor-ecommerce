<button type="button" class="auth-btn-google" (click)="open()">
  <svg class="auth-google-icon" viewBox="0 0 48 48">
    <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.8 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.1 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/>
    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.1 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.6 8.3 6.3 14.7z"/>
    <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.3 35.4 26.8 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
    <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.3 5.3C39.9 36.9 44 31 44 24c0-1.3-.1-2.7-.4-3.5z"/>
  </svg>
  Continue with Google
</button>

@if (showModal()) {
  <div class="auth-modal-backdrop" (click)="cancel()">
    <div class="auth-modal" (click)="$event.stopPropagation()">
      @if (!loading()) {
        <div class="auth-modal__title">Choose an account</div>
        <div class="auth-modal__subtitle">to continue to Millennium Semiconductors (Demo)</div>
        <button type="button" class="auth-modal__account" (click)="choose()">
          <div class="auth-modal__avatar">GD</div>
          <div>
            <strong style="display:block;font-size:13px;color:#1a1a2e;">Gajanan Deo</strong>
            <span style="font-size:11px;color:#777;">gajanan.deo&#64;google.com</span>
          </div>
        </button>
        <button type="button" class="auth-modal__cancel" (click)="cancel()">Cancel</button>
      } @else {
        <div class="auth-modal__spinner"></div>
        <div class="auth-modal__subtitle">Signing you in…</div>
      }
    </div>
  </div>
}
